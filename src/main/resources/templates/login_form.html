<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Вход в NZKStaffPanel</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" th:href="@{/styles/login_form.css}">
</head>

<body>
<div class="login-wrapper">
	<div class="login-container">
		<div class="logo-section">
			<div class="logo-icon">
				<i class="fas fa-cube"></i>
			</div>
			<h1>NZK Staff Panel</h1>
			<p>Панель состава NZK</p>
		</div>

		<div th:if="${param.error}" class="error-message" style="display: block;">
			<i class="fas fa-exclamation-triangle"></i>
			<span>Неверный логин или пароль</span>
		</div>

		<div th:if="${param.logout}" class="success-message" style="display: block;">
			<i class="fas fa-check-circle"></i>
			<span>Вы вышли из системы</span>
		</div>

		<form class="login-form" th:action="@{/perform_login}" method="post">
			<div class="form-group">
				<div class="input-group">
					<div class="input-icon">
						<i class="fas fa-user"></i>
					</div>
					<input type="text" id="username" name="username" placeholder="Введите ваш никнейм"
						   autocomplete="username" required>
				</div>
			</div>

			<div class="form-group">
				<div class="input-group">
					<div class="input-icon">
						<i class="fas fa-lock"></i>
					</div>
					<input type="password" id="password" name="password" placeholder="Пароль"
						   autocomplete="current-password" required>
				</div>
			</div>

			<div class="form-options">
				<label class="checkbox-label">
					<input type="checkbox" name="remember-me">
					<span>Запомнить меня</span>
				</label>
				<a href="#" class="forgot-link">Забыли пароль?</a>
			</div>

			<button type="submit" class="login-btn">
				<i class="fas fa-sign-in-alt"></i>
				<span>Войти в систему</span>
			</button>

			<div class="info-block">
				<i class="fas fa-shield-alt"></i> Безопасное подключение
			</div>
		</form>
	</div>
</div>

<script th:src="@{/scripts/login_form.js}"></script>
</body>

</html>
