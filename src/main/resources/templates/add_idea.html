<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NZK | Добавить идею постройки</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" th:href="styles/add_idea.css">
</head>

<header th:insert="blocks/header :: header"></header>

<body>
	<div class="page-wrapper">
		<div class="idea-card">
			<div class="card-header">
				<div class="header-title">
					<i class="fas fa-lightbulb"></i>
					<h2>Новая идея постройки</h2>
				</div>
				<div class="idea-badge">
					<i class="fas fa-palette"></i> NZK Build Ideas
				</div>
			</div>
			<div class="card-body">
				<form id="addIdeaForm">
					<!-- автор идеи (текстовое поле) -->
					<div class="form-group">
						<label><i class="fas fa-user"></i> Автор идеи</label>
						<input type="text" id="authorName" placeholder="Введите ваш никнейм" required>
					</div>

					<!-- название идеи -->
					<div class="form-group">
						<label><i class="fas fa-tag"></i> Название идеи</label>
						<input type="text" id="ideaTitle" placeholder="например: Неоготический собор с витражами"
							required>
					</div>

					<!-- категория постройки -->
					<div class="form-group">
						<label><i class="fas fa-folder-open"></i> Категория</label>
						<select id="ideaCategory">
							<option value="castle">🏰 Замки / Крепости</option>
							<option value="medieval">🏡 Средневековые постройки</option>
							<option value="fantasy">🐉 Фэнтези / Магические</option>
							<option value="modern">🏙️ Современные / Городские</option>
							<option value="nature">🌿 Природные / Ландшафт</option>
							<option value="redstone">🔴 Редстоун / Механизмы</option>
							<option value="interior">🪑 Интерьеры / Декор</option>
						</select>
					</div>

					<!-- описание идеи -->
					<div class="form-group">
						<label><i class="fas fa-align-left"></i> Описание идеи</label>
						<textarea id="ideaDescription" rows="4"
							placeholder="Опишите концепцию, ключевые особенности, примерные размеры, стиль и атмосферу..."></textarea>
					</div>

					<!-- сложность реализации (одно поле) -->
					<div class="form-group">
						<label><i class="fas fa-chart-line"></i> Сложность реализации</label>
						<select id="difficulty">
							<option value="easy">🌱 Лёгкая (1-2 дня)</option>
							<option value="medium" selected>⭐ Средняя (3-7 дней)</option>
							<option value="hard">🔥 Высокая (1-2 недели)</option>
							<option value="epic">💎 Эпическая (2+ недель)</option>
						</select>
					</div>

					<!-- три поля: размеры, материалы, референсы -->
					<div class="row-3cols">
						<div class="form-group">
							<label><i class="fas fa-expand"></i> Примерные размеры</label>
							<input type="text" id="size" placeholder="например: 50x50 блоков">
						</div>
						<div class="form-group">
							<label><i class="fas fa-cubes"></i> Основные материалы</label>
							<input type="text" id="materials" placeholder="камень, дерево, стекло...">
						</div>
						<div class="form-group">
							<label><i class="fas fa-link"></i> Референсы</label>
							<input type="text" id="references" placeholder="ссылки на изображения или видео">
						</div>
					</div>

					<!-- кнопки -->
					<div class="form-actions">
						<button type="button" class="btn-outline" id="clearBtn"><i class="fas fa-undo-alt"></i>
							Очистить</button>
						<button type="submit" class="btn-primary"><i class="fas fa-lightbulb"></i> Добавить
							идею</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<!-- футер -->
	<div th:insert="blocks/footer :: footer"></div>

	<script src="src/main/resources/static/scripts/add_idea.js"></script>

</body>

</html>
