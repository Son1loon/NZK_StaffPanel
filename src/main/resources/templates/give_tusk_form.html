<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NZK | Выдать таск билдеру</title>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" th:href="@{/styles/give_tusk_form.css}">
	<link rel="stylesheet" th:href="@{/styles/blocks/header.css}">
	<link rel="stylesheet" th:href="@{/styles/blocks/footer.css}">
</head>

<body>
<div class="hub-wrapper">
	<header th:replace="~{blocks/header :: header}"></header>

	<div class="page-wrapper">
		<div class="task-card">
			<div class="card-header">
				<div class="header-title">
					<i class="fas fa-hard-hat"></i>
					<h2>Выдать таск билдеру</h2>
				</div>
				<div class="builder-badge">
					<i class="fas fa-cube"></i> NZK Build Team
				</div>
			</div>
			<div class="card-body">
				<form id="builderTaskForm">
					<div class="form-group">
						<label><i class="fas fa-user-helmet-safety"></i> Строитель</label>
						<select id="builderName" required>
							<option value="" disabled selected>— Загрузка списка строителей... —</option>
						</select>
					</div>

					<div class="form-group">
						<label><i class="fas fa-trowel"></i> Название таска</label>
						<input type="text" id="taskName" placeholder="например: Возвести кузницу" required>
					</div>

					<div class="form-group">
						<label><i class="fas fa-pen-ruler"></i> Краткое описание / требования</label>
						<textarea id="taskDescription" placeholder="Размер, стиль, координаты, важные детали..."></textarea>
					</div>

					<div class="row-2cols">
						<div class="form-group">
							<label><i class="fas fa-chart-simple"></i> Приоритет</label>
							<select id="priority" class="priority-select">
								<option value="HIGH">🔥 Высокий</option>
								<option value="MEDIUM" selected>⭐ Средний</option>
								<option value="LOW">❄️ Низкий</option>
							</select>
						</div>
						<div class="form-group">
							<label><i class="fas fa-calendar"></i> Срок</label>
							<input type="date" id="deadline" required>
						</div>
					</div>

					<div class="form-group">
						<label><i class="fas fa-link"></i> Референс / ссылка (опционально)</label>
						<input type="text" id="reference" placeholder="https:// или краткий комментарий">
					</div>

					<div class="form-actions">
						<button type="button" class="btn-outline" id="clearBtn"><i class="fas fa-undo-alt"></i> Очистить</button>
						<button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Выдать</button>
					</div>
				</form>
				<div id="formMessage" class="form-message" style="display: none;"></div>
			</div>
		</div>
	</div>

	<div th:replace="~{blocks/footer :: footer}"></div>
</div>

<script th:src="@{/scripts/give_tusk_form.js}"></script>
</body>

</html>
