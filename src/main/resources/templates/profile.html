<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация — NZKStaffPanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c15 0%, #0f111f 100%);
            color: #eef2ff;
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(75, 100, 200, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .login-container {
            max-width: 460px;
            margin: 0 auto;
            background: linear-gradient(125deg, rgba(31, 38, 70, 0.85), rgba(20, 24, 48, 0.9));
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(100, 120, 200, 0.3);
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeSlide 0.5s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #2c3f94, #1a266a);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.2rem;
            color: #ffda88;
        }

        .logo-section h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #9ca9db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-section p {
            color: #9ca9db;
            font-size: 0.9rem;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(100, 120, 200, 0.3);
            padding-bottom: 0.5rem;
            justify-content: center;
        }

        .auth-tab {
            background: transparent;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #9ca9db;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 2rem;
            font-family: 'Inter', sans-serif;
        }

        .auth-tab.active {
            background: linear-gradient(95deg, #3b4ecf, #562de0);
            color: white;
            box-shadow: 0 2px 8px rgba(86, 45, 224, 0.3);
        }

        .auth-tab:hover:not(.active) {
            background: rgba(100, 120, 200, 0.2);
            color: white;
        }

        .auth-pane {
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .auth-pane.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .input-group {
            background: #0d1122;
            border: 1px solid #2a2f48;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .input-group:hover {
            border-color: #4f62b0;
        }

        .input-group:focus-within {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }

        .input-icon {
            padding: 0 1rem;
            color: #9ca9db;
            font-size: 1.1rem;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 1rem 0.9rem 0;
            color: #eef2ff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .input-group input::placeholder {
            color: #4a5078;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            font-size: 0.85rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #b9c4f0;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #6c5ce7;
        }

        .btn-login, .btn-register {
            width: 100%;
            background: linear-gradient(95deg, #3b4ecf, #562de0);
            border: none;
            padding: 0.9rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover, .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(86, 45, 224, 0.4);
        }

        .error-message, .success-message {
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #f87171;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .info-block {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(100, 120, 200, 0.2);
            text-align: center;
            font-size: 0.8rem;
            color: #7a82ae;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .login-wrapper { padding: 1rem; }
            .login-container { padding: 1.8rem; }
            .logo-section h1 { font-size: 1.5rem; }
            .form-options {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }
            .auth-tabs { gap: 0.5rem; }
            .auth-tab { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
        }
    </style>
</head>

<body>
<div class="particles-bg" id="particles"></div>

<div class="login-wrapper">
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-cube"></i>
            </div>
            <h1>NZK Staff Panel</h1>
            <p>Панель состава NZK</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">🔐 Вход</button>
            <button class="auth-tab" data-tab="register">📝 Регистрация</button>
        </div>

        <!-- Панель входа -->
        <div class="auth-pane active" id="login-pane">
            <div id="loginErrorMessage" class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span></span>
            </div>
            <div id="loginSuccessMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-user"></i></div>
                        <input type="text" id="loginUsername" name="username" placeholder="Никнейм" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-lock"></i></div>
                        <input type="password" id="loginPassword" name="password" placeholder="Пароль" autocomplete="current-password" required>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Запомнить меня</span>
                    </label>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Войти</span>
                </button>
            </form>
        </div>

        <!-- Панель регистрации -->
        <div class="auth-pane" id="register-pane">
            <div id="registerMessage" class="error-message" style="display: none;">
                <i class="fas fa-info-circle"></i>
                <span></span>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-user"></i></div>
                        <input type="text" id="regUsername" placeholder="Впишите никнейм" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-lock"></i></div>
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 3 символа)" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-check-circle"></i></div>
                        <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль" required>
                    </div>
                </div>
                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Отправить заявку</span>
                </button>
            </form>
            <div class="info-block">
                <i class="fas fa-clock"></i> После отправки заявки дождитесь подтверждения администратором
            </div>
        </div>

        <div class="info-block">
            <i class="fas fa-shield-alt"></i> Безопасное подключение
        </div>
    </div>
</div>

<script>
    // Переключение вкладок
    function switchTab(tabName) {
        const tabs = document.querySelectorAll('.auth-tab');
        const panes = document.querySelectorAll('.auth-pane');

        tabs.forEach(tab => {
            if (tab.getAttribute('data-tab') === tabName) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });

        panes.forEach(pane => {
            if (pane.id === `${tabName}-pane`) {
                pane.classList.add('active');
            } else {
                pane.classList.remove('active');
            }
        });
    }

    // Подключаем обработчики
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabName = tab.getAttribute('data-tab');
            switchTab(tabName);
        });
    });

    // ========== ЛОГИН ==========
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('loginErrorMessage');
            const successDiv = document.getElementById('loginSuccessMessage');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!username || !password) {
                showMessage(errorDiv, '❌ Заполните все поля', true);
                return;
            }

            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="loader"></span><span> Вход...</span>';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, rememberMe })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Сохраняем данные
                    localStorage.setItem('sessionId', data.sessionId);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('isAdmin', data.user.roles.includes('ROLE_ADMIN'));

                    if (rememberMe) {
                        localStorage.setItem('rememberedUser', JSON.stringify({ username }));
                    } else {
                        localStorage.removeItem('rememberedUser');
                    }

                    showMessage(successDiv, '✅ Вход выполнен! Перенаправление...', false);

                    setTimeout(() => {
                        window.location.href = '/hub.html';
                    }, 1000);
                } else {
                    showMessage(errorDiv, '❌ ' + (data.error || 'Неверный логин или пароль'), true);
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage(errorDiv, '❌ Ошибка соединения с сервером', true);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        });
    }

    // ========== РЕГИСТРАЦИЯ ==========
    const registerForm = document.getElementById('registerForm');
    if (registerForm) {
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const msgDiv = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');

            msgDiv.style.display = 'none';

            if (!username || !password) {
                showMessage(msgDiv, '❌ Заполните все поля', true);
                return;
            }
            if (password !== confirm) {
                showMessage(msgDiv, '❌ Пароли не совпадают', true);
                return;
            }
            if (password.length < 3) {
                showMessage(msgDiv, '❌ Пароль должен быть минимум 3 символа', true);
                return;
            }
            if (username.length < 3) {
                showMessage(msgDiv, '❌ Имя пользователя должно быть минимум 3 символа', true);
                return;
            }

            registerBtn.disabled = true;
            const originalText = registerBtn.innerHTML;
            registerBtn.innerHTML = '<span class="loader"></span><span> Отправка...</span>';

            try {
                const response = await fetch('/api/register-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage(msgDiv, '✅ Заявка отправлена! Администратор рассмотрит её.', false);
                    registerForm.reset();
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    showMessage(msgDiv, '❌ ' + (data.error || 'Ошибка отправки заявки'), true);
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage(msgDiv, '❌ Ошибка соединения с сервером', true);
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = originalText;
            }
        });
    }

    function showMessage(element, message, isError = true) {
        if (!element) return;
        const textSpan = element.querySelector('span');
        if (textSpan) textSpan.textContent = message;
        element.style.display = 'flex';
        if (isError) {
            element.classList.add('error-message');
            element.classList.remove('success-message');
        } else {
            element.classList.add('success-message');
            element.classList.remove('error-message');
        }
        setTimeout(() => {
            element.style.display = 'none';
        }, 5000);
    }

    // Частицы
    function createParticles() {
        const container = document.getElementById('particles');
        if (!container) return;
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            particle.style.opacity = Math.random() * 0.4;
            container.appendChild(particle);
        }
    }

    createParticles();

    // Восстановление сохранённого пользователя
    if (localStorage.getItem('rememberedUser')) {
        try {
            const remembered = JSON.parse(localStorage.getItem('rememberedUser'));
            const usernameInput = document.getElementById('loginUsername');
            const rememberCheckbox = document.getElementById('rememberMe');
            if (usernameInput) usernameInput.value = remembered.username;
            if (rememberCheckbox) rememberCheckbox.checked = true;
        } catch (e) {
            localStorage.removeItem('rememberedUser');
        }
    }
</script>
</body>

</html>
