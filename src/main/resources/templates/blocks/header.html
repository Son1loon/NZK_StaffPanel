<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="header">
    <header class="hub-header">
        <div class="header-container">
            <div class="logo-block">
                <div class="logo-icon">
                    <i class="fas fa-cube"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-nzk">NZK</span>
                    <span class="logo-sub">Staff Hub</span>
                </div>
            </div>

            <nav class="hub-nav">
                <button class="nav-tab active" data-tab="dashboard">
                    <i class="fas fa-chalkboard-user"></i>
                    <span>Обзор</span>
                </button>
                <button class="nav-tab" data-tab="builders">
                    <i class="fas fa-hard-hat"></i>
                    <span>Строители</span>
                </button>
                <button class="nav-tab" data-tab="voice-actors">
                    <i class="fas fa-microphone-alt"></i>
                    <span>Актёры</span>
                </button>
                <button class="nav-tab" data-tab="ideas">
                    <i class="fas fa-lightbulb"></i>
                    <span>Идеи</span>
                </button>
                <button class="nav-tab" data-tab="audio">
                    <i class="fas fa-head-side-headphones"></i>
                    <span>Звуки</span>
                </button>
                <button th:if="${isAdmin}" class="nav-tab" data-tab="registration-requests">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Заявки</span>
                    <span class="request-badge" id="requestsBadge" style="display: none;">!</span>
                </button>
                <button th:if="${isAdmin}" class="nav-tab" data-tab="users-management">
                    <i class="fas fa-users-gear"></i>
                    <span>Управление</span>
                </button>
            </nav>

            <div class="user-shortcut">
                <div class="user-avatar">
                    <i class="fas fa-user-astronaut"></i>
                </div>
                <div class="user-meta">
                    <span class="user-name" th:text="${username}">Admin</span>
                    <span class="user-role" th:text="${isAdmin} ? 'Админ' : 'Сотрудник'">Админ</span>
                </div>
                <form th:action="@{/logout}" method="post" style="margin: 0; display: inline;">
                    <button type="submit" class="logout-icon-btn" title="Выйти">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </form>
            </div>
        </div>
    </header>
</div>
</html>
