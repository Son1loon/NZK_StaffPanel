spring.application.name=NZKStuffPanel

spring.datasource.url=jdbc:${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.open-in-view=false

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static resources
spring.web.resources.cache.period=86400

# Server
server.forward-headers-strategy=native
server.tomcat.redirect-context-root=true
server.use-forward-headers=true
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,text/javascript,application/json
server.servlet.session.timeout=30m
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

# Cloudinary
cloudinary.cloud-name=dzrbma2st
cloudinary.api-key=484965244899611
cloudinary.api-secret=MN5h0SKPxy4hLN5G8Q2Fk5FG1EE

# File upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# HikariCP
spring.datasource.hikari.maximumPoolSize=3
spring.datasource.hikari.minimumIdle=1
spring.datasource.hikari.idleTimeout=300000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maxLifetime=600000

# JMX
spring.jmx.enabled=false